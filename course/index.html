<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>講座タイトル | AI Mastery 特典</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/animations.css">
</head>
<body>

<!-- Header -->
<header class="detail-header">
  <a href="../index.html" class="detail-header__back">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 16l-6-6 6-6"/></svg>
    講座一覧
  </a>
  <p class="detail-header__title">講座タイトルが入ります</p>
</header>

<!-- Main -->
<div class="detail-main">

  <!-- Left: video + info -->
  <div>
    <!-- Video Player -->
    <div class="video-player-wrap">
      <!-- YouTube差し込み: <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe> -->
      <div class="video-placeholder-inner">
        <svg viewBox="0 0 48 48" fill="currentColor"><path d="M24 4C12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20S35.05 4 24 4zm-4 28.5v-17l12 8.5-12 8.5z"/></svg>
        <p>動画を準備中です</p>
      </div>
    </div>

    <!-- Course Info -->
    <div class="course-info">
      <p class="course-info__category">カテゴリ名</p>
      <h1 class="course-info__title">講座タイトルが入ります</h1>
      <div class="course-info__meta">
        <span>収録時間：0:00:00</span>
        <span>難易度：初級</span>
      </div>
      <p class="course-info__desc">
        講座の説明文がここに入ります。この講座で学べる内容、対象者、学習後に得られるスキルなどを記載します。
      </p>
    </div>
  </div>

  <!-- Right: playlist -->
  <aside class="detail-sidebar">
    <p class="detail-sidebar__title">この講座の動画</p>
    <div class="detail-playlist">

      <!-- 再生中 -->
      <div class="playlist-item is-active">
        <span class="playlist-item__num">1</span>
        <div class="playlist-item__thumb"></div>
        <div class="playlist-item__info">
          <p class="playlist-item__title">動画タイトルが入ります</p>
          <p class="playlist-item__duration">0:00:00</p>
        </div>
      </div>

      <!-- 通常 -->
      <div class="playlist-item">
        <span class="playlist-item__num">2</span>
        <div class="playlist-item__thumb"></div>
        <div class="playlist-item__info">
          <p class="playlist-item__title">動画タイトルが入ります</p>
          <p class="playlist-item__duration">0:00:00</p>
        </div>
      </div>

      <div class="playlist-item">
        <span class="playlist-item__num">3</span>
        <div class="playlist-item__thumb"></div>
        <div class="playlist-item__info">
          <p class="playlist-item__title">動画タイトルが入ります</p>
          <p class="playlist-item__duration">0:00:00</p>
        </div>
      </div>

      <!-- ロック -->
      <div class="playlist-item" style="opacity:0.5">
        <span class="playlist-item__num">4</span>
        <div class="playlist-item__thumb"></div>
        <div class="playlist-item__info">
          <p class="playlist-item__title">動画タイトルが入ります</p>
          <p class="playlist-item__duration">0:00:00</p>
        </div>
        <div class="playlist-item__lock">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
      </div>

      <div class="playlist-item" style="opacity:0.5">
        <span class="playlist-item__num">5</span>
        <div class="playlist-item__thumb"></div>
        <div class="playlist-item__info">
          <p class="playlist-item__title">動画タイトルが入ります</p>
          <p class="playlist-item__duration">0:00:00</p>
        </div>
        <div class="playlist-item__lock">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
      </div>

    </div>
  </aside>

</div>

<script src="../js/unlock.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
